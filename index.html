<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Yung Redação - Envio</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; margin: 10px 0; border-radius: 6px; }
        select, button { width: 100%; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="login" class="card">
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="painel" class="card" style="display:none;">
        <select id="listaRedacoes"></select>
        <textarea id="texto" placeholder="Cole sua redação aqui..."></textarea>
        <button onclick="enviarRascunho()">Enviar para Rascunhos</button>
    </div>

    <script>
        let tokenGlobal = "";

        async function fazerLogin() {
            // ... (mesma lógica de login que você já tem)
            // Após logar, chame listarRedacoes()
        }

        async function listarRedacoes() {
            const res = await fetch('/api/redacoes', { headers: { 'Authorization': tokenGlobal } });
            const data = await res.json();
            // Preencher o select id="listaRedacoes" com os dados da API
        }

        async function enviarRascunho() {
            const idRedacao = document.getElementById('listaRedacoes').value;
            const texto = document.getElementById('texto').value;

            const res = await fetch('/api/salvar-rascunho', {
                method: 'POST',
                headers: { 'Authorization': tokenGlobal, 'Content-Type': 'application/json' },
                body: JSON.stringify({ idRedacao, texto })
            });
            alert(res.ok ? "Rascunho salvo com sucesso!" : "Erro ao enviar.");
        }
    </script>
</body>
</html>
