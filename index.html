<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Elefante Letrado - App</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; width: 100%; max-width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #38bdf8; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #output { margin-top: 20px; width: 100%; max-width: 600px; background: #1e293b; padding: 15px; border-radius: 8px; font-size: 0.8rem; overflow-x: auto; display: none; }
    </style>
</head>
<body>
    <div class="card" id="loginCard">
        <h2>🐘 Login</h2>
        <input type="text" id="user" placeholder="1234567890sp">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="actionPanel" style="display: none; text-align: center;">
        <h3>Menu</h3>
        <button onclick="buscarDados('readings')">Listar Livros</button>
    </div>

    <pre id="output"></pre>

    <script>
        async function fazerLogin() {
            const user = document.getElementById('user').value;
            const senha = document.getElementById('senha').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, senha })
            });
            const data = await res.json();
            const token = data.token || data.accessToken;

            if (token) {
                localStorage.setItem('elefante_token', token);
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('actionPanel').style.display = 'block';
                alert('Logado!');
            } else { alert('Erro no login'); }
        }

        async function buscarDados(tipo) {
            const token = localStorage.getItem('elefante_token');
            const output = document.getElementById('output');
            output.style.display = 'block';
            output.innerText = "Carregando...";

            try {
                const res = await fetch(`/api/books?type=${tipo}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const text = await res.text(); // Pega o texto bruto primeiro
                const data = JSON.parse(text); // Tenta converter para JSON
                output.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                output.innerText = "Erro ao processar resposta da API.";
            }
        }
    </script>
</body>
</html>
