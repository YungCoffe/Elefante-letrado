<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Elefante Letrado - App</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; width: 100%; max-width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #38bdf8; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card" id="loginCard">
        <h2>🐘 Login</h2>
        <input type="text" id="user" placeholder="1234567890sp">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <script>
        async function fazerLogin() {
            const user = document.getElementById('user').value;
            const senha = document.getElementById('senha').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, senha })
            });
            const data = await res.json();
            if (data.token || data.accessToken) {
                localStorage.setItem('elefante_token', data.token || data.accessToken);
                alert('Logado! Agora você pode buscar livros ou quizzes.');
            } else { alert('Erro no login'); }
        }

        // Exemplo de como buscar dados após logar:
        async function buscarDados(tipo) {
            const token = localStorage.getItem('elefante_token');
            const res = await fetch(`/api/books?type=${tipo}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            console.log(await res.json());
        }
    </script>
</body>
</html>
